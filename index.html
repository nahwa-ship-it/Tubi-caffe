<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="titleCafe">Memuat...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero" id="heroBg">
        <div class="hero-content">
            <img id="logoCafe" src="" alt="Logo" class="cafe-logo-img" style="display:none;">
            <h1 id="namaCafe">Memuat Nama Cafe...</h1>
            <p id="taglineCafe">Memuat Tagline...</p>
            <div class="hero-buttons">
                <a href="reservasi.html" class="btn btn-primary">Reservasi Meja</a>
                <a href="#menu" class="btn btn-secondary">Lihat Menu</a>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Filter Kategori -->
        <section class="category-section">
            <div id="categoryFilter" class="category-tabs"></div>
        </section>

        <!-- Daftar Menu -->
        <section id="menu" class="menu-section">
            <h2>Daftar Menu Kami</h2>
            <div id="menuContainer" class="menu-grid"></div>
        </section>

        <!-- Info Cafe -->
        <section class="info-section">
            <h2>Informasi Cafe</h2>
            <p><strong>Alamat:</strong> <span id="alamatCafe">-</span></p>
            <p><strong>Jam Operasional:</strong> <span id="jamCafe">-</span></p>
        </section>
    </main>

    <!-- Tombol Keranjang Melayang -->
    <button id="cartButton" class="cart-floating" onclick="openCart()">
        🛒
        <span id="cartCount" class="cart-count">0</span>
    </button>

    <!-- Floating WhatsApp -->
    <a id="waFloat" href="#" target="_blank" class="wa-floating">💬 Hubungi Kami</a>

    <!-- Panel Keranjang -->
    <div id="cartPanel" class="cart-panel">
        <div class="cart-panel-content">
            <div class="cart-panel-header">
                <h3>Keranjang Pesanan</h3>
                <button onclick="closeCart()" class="cart-close-btn">&times;</button>
            </div>
            <div id="cartItems" class="cart-items"></div>
            <div class="cart-footer">
                <div class="cart-total-row">
                    <span>Total</span>
                    <span id="cartTotal">Rp 0</span>
                </div>
                <button class="btn btn-primary btn-block" onclick="openCheckoutForm()">Checkout</button>
            </div>
        </div>
    </div>
    <div id="cartOverlay" class="cart-overlay" onclick="closeCart()"></div>

    <!-- Modal Checkout -->
    <div id="checkoutModal" class="checkout-modal">
        <div class="checkout-modal-content">
            <div class="cart-panel-header">
                <h3>Data Pemesan</h3>
                <button onclick="closeCheckoutForm()" class="cart-close-btn">&times;</button>
            </div>
            <form id="formCheckout">
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" id="checkoutNama" required>
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <input type="tel" id="checkoutWA" placeholder="08xxxxxxxxxx" required>
                </div>
                <button type="submit" id="btnCheckout" class="btn btn-primary btn-block">Bayar Sekarang</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="Mid-client-8_rBMFxCfMKS--9z"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", initPublicPage);
    </script>
</body>
</html>
